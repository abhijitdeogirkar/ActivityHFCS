<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>Activity Tracker</h1>
        <div id="loader">डेटा लोड होत आहे...</div>
        <form id="activityForm" style="display: none;">
            <label>ॲक्टिव्हिटी:</label>
            <select id="activity"><option value="">-- निवडा --</option></select>
            <label>वर्ग:</label>
            <select id="classSelect"><option value="">-- निवडा --</option></select>
            <label>सेक्शन:</label>
            <select id="sectionSelect"><option value="">-- निवडा --</option></select>
            <label>विद्यार्थी:</label>
            <select id="studentSelect"><option value="">-- निवडा --</option></select>
            <label>प्रयत्न:</label>
            <input type="number" id="attempt" value="1">
            <video id="videoPreview" autoplay playsinline muted></video>
            <button type="button" id="startCameraBtn">कॅमेरा सुरू करा</button>
            <button type="button" id="startRecordBtn" disabled>रेकॉर्ड</button>
            <button type="button" id="stopRecordBtn" disabled>थांबवा</button>
            <button type="button" id="uploadBtn" disabled>अपलोड</button>
        </form>
    </div>
    <script src="camera.js"></script>
    <script src="app.js"></script>
</body>
</html>

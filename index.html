<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>Activity Tracker</h1>
        
        <div id="loader">डेटा लोड होत आहे...</div>

        <!-- इथे onload इव्हेंट जोडला आहे -->
        <iframe name="hiddenIframe" id="hiddenIframe" style="display:none;" onload="handleIframeLoad()"></iframe>

        <form id="activityForm" method="POST" enctype="multipart/form-data" target="hiddenIframe" style="display: none;">
            <label>ॲक्टिव्हिटी:</label>
            <select name="activityName" id="activity" required><option value="">-- निवडा --</option></select>
            
            <label>वर्ग:</label>
            <select name="className" id="classSelect" required><option value="">-- निवडा --</option></select>
            
            <label>सेक्शन:</label>
            <select name="sectionName" id="sectionSelect" required><option value="">-- निवडा --</option></select>
            
            <label>विद्यार्थी:</label>
            <select name="studentVal" id="studentSelect" required><option value="">-- निवडा --</option></select>
            
            <label>प्रयत्न:</label>
            <input type="number" name="attempt" id="attempt" value="1" required>
            
            <div style="margin-top: 15px; padding: 10px; background: #eef2f5; border-radius: 5px;">
                <label>गॅलरीमधून व्हिडिओ किंवा फोटो निवडा (Max 50MB):</label>
                <input type="file" name="mediaFile" id="mediaFile" accept="video/*, image/*" required>
                <p id="fileStatus" style="font-weight: bold; margin-top: 5px; color: #555;"></p>
            </div>

            <button type="submit" id="uploadBtn" style="margin-top: 20px;">अपलोड आणि सेंड करा</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
